<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SVS Fundraising Thermometer</title>

<style>
  :root {
    --svs-purple: #4A306D;
    --svs-light-purple: #745B95;
    --svs-peach: #F2D0C9;
    --bg-gray: #F9F9F9;
  }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    background: #ffffff;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: #333;
    padding: 40px 20px;
  }

  /* LOGO HEADER */
  .header {
    margin-bottom: 50px;
    text-align: center;
  }

  .logo {
    max-width: 350px;
    height: auto;
  }

  /* MAIN CONTAINER */
  .container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 60px;
    margin-bottom: 50px;
    width: 100%;
    max-width: 900px;
  }

  /* SCALE */
  .scale {
    height: 400px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    font-size: 16px;
    font-weight: bold;
    color: var(--svs-purple);
    text-align: right;
  }

  /* THERMOMETER */
  .thermometer {
    position: relative;
    width: 80px;
    height: 400px;
    background: #eee;
    border: 3px solid #ddd;
    border-radius: 40px;
    overflow: hidden;
    box-shadow: inset 0 4px 10px rgba(0,0,0,0.05);
  }

  .fill {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 0%;
    /* Gradient using SVS Purple and Peach */
    background: linear-gradient(to top, var(--svs-purple), var(--svs-light-purple), var(--svs-peach));
    transition: height 0.8s cubic-bezier(0.17, 0.67, 0.83, 0.67);
  }

  /* PERCENTAGE TICKS */
  .tick-mark {
    position: absolute;
    left: 0;
    width: 100%;
    height: 1px;
    background: rgba(255,255,255,0.4);
    z-index: 2;
  }

  /* INFO PANEL */
  .info {
    flex: 1;
  }

  .title {
    font-size: 24px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #777;
    margin-bottom: 5px;
  }

  .amount {
    font-size: 60px;
    font-weight: 900;
    color: var(--svs-purple);
    margin: 0;
  }

  .goal-text {
    font-size: 24px;
    color: #555;
    margin-top: 5px;
  }

  /* INPUT AT BOTTOM */
  .controls {
    border-top: 2px solid #eee;
    padding-top: 30px;
    width: 100%;
    max-width: 400px;
    text-align: center;
  }

  .controls label {
    display: block;
    margin-bottom: 10px;
    font-weight: bold;
    color: var(--svs-purple);
  }

  input {
    padding: 15px;
    font-size: 20px;
    border-radius: 12px;
    border: 2px solid var(--svs-purple);
    width: 100%;
    max-width: 300px;
    text-align: center;
    outline: none;
    transition: box-shadow 0.3s;
  }

  input:focus {
    box-shadow: 0 0 10px rgba(74, 48, 109, 0.2);
  }
</style>
</head>
<body>

  <header class="header">
    <img src="Main SVS Logo.jpg" alt="Supporting Voices of Survivors Logo" class="logo">
  </header>

  <div class="container">
    <div class="scale">
      <div>$85,000</div>
      <div>$63,750</div>
      <div>$42,500</div>
      <div>$21,250</div>
      <div>$0</div>
    </div>

    <div class="thermometer">
      <div class="tick-mark" style="bottom: 25%;"></div>
      <div class="tick-mark" style="bottom: 50%;"></div>
      <div class="tick-mark" style="bottom: 75%;"></div>
      
      <div class="fill" id="fill"></div>
    </div>

    <div class="info">
      <p class="title">Current Progress</p>
      <h1 class="amount" id="amountText">$0</h1>
      <p class="goal-text">Goal: <strong>$85,000</strong></p>
    </div>
  </div>

  <div class="controls">
    <label for="amountInput">Update Fundraising Total:</label>
    <input id="amountInput" type="number" placeholder="Enter $ amount" min="0">
  </div>

  <script>
    const goal = 85000;
    const fill = document.getElementById("fill");
    const amountText = document.getElementById("amountText");
    const input = document.getElementById("amountInput");

    function updateThermometer(value) {
      const amount = Number(value) || 0;
      const percentage = Math.min((amount / goal) * 100, 100);
      
      // Update the height of the purple/peach bar
      fill.style.height = percentage + "%";
      
      // Update the text display with commas
      amountText.textContent = "$" + amount.toLocaleString();
    }

    // Listen for typing in the bottom box
    input.addEventListener("input", (e) => {
      updateThermometer(e.target.value);
    });
  </script>

</body>
</html>
