<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Thermometer</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #0f172a;
    font-family: Arial, sans-serif;
    color: white;
  }

  .container {
    display: flex;
    align-items: center;
    gap: 80px;
  }

  /* INPUT PANEL */
  .controls {
    position: absolute;
    top: 20px;
    text-align: center;
  }

  input {
    padding: 10px;
    font-size: 18px;
    border-radius: 8px;
    border: none;
    width: 200px;
  }

  button {
    padding: 10px 15px;
    font-size: 16px;
    margin-left: 10px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
  }

  /* SCALE */
  .scale {
    height: 80vh;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    font-size: 14px;
    opacity: 0.8;
  }

  /* THERMOMETER */
  .thermometer {
    position: relative;
    width: 120px;
    height: 80vh;
    background: rgba(255,255,255,0.08);
    border-radius: 60px;
    border: 2px solid rgba(255,255,255,0.25);
    overflow: hidden;
  }

  .fill {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 0%;
    background: linear-gradient(to top, #ff3b3b, #ffb347);
    transition: height 0.6s ease;
    border-bottom-left-radius: 60px;
    border-bottom-right-radius: 60px;
  }

  .bulb {
    position: absolute;
    bottom: -70px;
    left: 50%;
    transform: translateX(-50%);
    width: 160px;
    height: 160px;
    background: #ff3b3b;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.25);
  }

  /* MARKERS */
  .tick {
    position: absolute;
    left: 0;
    width: 100%;
    height: 2px;
    background: rgba(255,255,255,0.25);
  }

  .tick-label {
    position: absolute;
    left: 130px;
    font-size: 12px;
    opacity: 0.7;
    transform: translateY(-50%);
  }

  /* INFO */
  .info {
    text-align: left;
  }

  .title {
    font-size: 32px;
    font-weight: bold;
    margin-bottom: 10px;
  }

  .amount {
    font-size: 28px;
    margin-bottom: 10px;
  }

  .goal {
    font-size: 18px;
    opacity: 0.8;
  }

</style>
</head>

<body>

<!-- INPUT -->
<div class="controls">
  <input id="input" type="number" placeholder="Enter amount ($)">
  <button onclick="updateFromInput()">Update</button>
</div>

<div class="container">

  <!-- SCALE -->
  <div class="scale">
    <div>$85,000</div>
    <div>$63,750</div>
    <div>$42,500</div>
    <div>$21,250</div>
    <div>$0</div>
  </div>

  <!-- THERMOMETER -->
  <div class="thermometer">

    <!-- ticks -->
    <div class="tick" style="bottom:25%"></div>
    <div class="tick-label" style="bottom:25%">25%</div>

    <div class="tick" style="bottom:50%"></div>
    <div class="tick-label" style="bottom:50%">50%</div>

    <div class="tick" style="bottom:75%"></div>
    <div class="tick-label" style="bottom:75%">75%</div>

    <div class="fill" id="fill"></div>
    <div class="bulb"></div>
  </div>

  <!-- INFO -->
  <div class="info">
    <div class="title">Fundraising Goal</div>
    <div class="amount" id="amount">$0</div>
    <div class="goal">Goal: $85,000</div>
  </div>

</div>

<script>
  const goal = 85000;

  const fill = document.getElementById("fill");
  const amountText = document.getElementById("amount");
  const input = document.getElementById("input");

  function updateThermometer(amount) {
    const percent = (amount / goal) * 100;
    fill.style.height = percent + "%";
    amountText.textContent = "$" + Number(amount).toLocaleString();
  }

  function updateFromInput() {
    const value = Number(input.value);
    if (isNaN(value)) return;
    updateThermometer(value);
  }

  // optional: press Enter to update
  input.addEventListener("keypress", function(e) {
    if (e.key === "Enter") updateFromInput();
  });

</script>

</body>
</html>
