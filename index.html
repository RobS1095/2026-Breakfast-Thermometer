<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Thermometer - SVS Fundraising</title>

<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column; /* Stack header and content */
    align-items: center;
    background: #ffffff;
    font-family: Arial, sans-serif;
    color: #111;
    padding: 20px;
  }

  /* HEADER / LOGO */
  .header {
    width: 100%;
    max-width: 800px;
    text-align: center;
    margin-bottom: 40px;
  }

  .logo {
    max-width: 300px; /* Adjust size as needed */
    height: auto;
  }

  /* INPUT */
  .controls {
    margin-bottom: 30px;
  }

  input {
    padding: 10px;
    font-size: 18px;
    border-radius: 8px;
    border: 1px solid #ccc;
    width: 220px;
    text-align: center;
  }

  .container {
    display: flex;
    align-items: center;
    gap: 60px;
    height: 60vh; /* Scaled down slightly to fit with header */
  }

  /* SCALE */
  .scale {
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    font-size: 14px;
    opacity: 0.6;
    padding-bottom: 10px; /* Align with thermometer bottom */
  }

  /* THERMOMETER */
  .thermometer {
    position: relative;
    width: 100px;
    height: 100%;
    background: #f3f3f3;
    border: 2px solid #ddd;
    border-radius: 50px;
    overflow: hidden;
  }

  .fill {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 0%;
    background: linear-gradient(to top, #4a306d, #a288bd); /* Matches logo colors */
    transition: height 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    border-radius: 0; 
  }

  /* MARKERS */
  .tick {
    position: absolute;
    left: 0;
    width: 10%;
    height: 1px;
    background: rgba(0,0,0,0.2);
  }

  .tick-label {
    position: absolute;
    left: 15%;
    font-size: 11px;
    opacity: 0.4;
    transform: translateY(-50%);
  }

  /* INFO */
  .info {
    text-align: left;
  }

  .title {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 5px;
    color: #4a306d; /* SVS Purple */
  }

  .amount {
    font-size: 42px;
    font-weight: 800;
    margin-bottom: 10px;
  }

  .goal {
    font-size: 24px;
    font-weight: 400;
    color: #666;
  }

</style>
</head>

<body>

<header class="header">
  <img src="https://i.ibb.co/hR0Y98v/Main-SVS-Logo.jpg" alt="SVS Logo" class="logo">
</header>

<div class="controls">
  <input id="amountInput" type="number" placeholder="Enter amount ($)">
</div>

<div class="container">

  <div class="scale">
    <div>$85,000</div>
    <div>$63,750</div>
    <div>$42,500</div>
    <div>$21,250</div>
    <div>$0</div>
  </div>

  <div class="thermometer">
    <div class="tick" style="bottom:25%"></div>
    <div class="tick-label" style="bottom:25%">25%</div>

    <div class="tick" style="bottom:50%"></div>
    <div class="tick-label" style="bottom:50%">50%</div>

    <div class="tick" style="bottom:75%"></div>
    <div class="tick-label" style="bottom:75%">75%</div>

    <div class="fill" id="fill"></div>
  </div>

  <div class="info">
    <div class="title">Fundraising Progress</div>
    <div class="amount" id="amount">$0</div>
    <div class="goal">Goal: $85,000</div>
  </div>

</div>

<script>
  const goal = 85000;
  const fill = document.getElementById("fill");
  const amountText = document.getElementById("amount");
  const input = document.getElementById("amountInput");

  function update(amount) {
    amount = Number(amount) || 0;
    const percent = Math.min((amount / goal) * 100, 100);

    fill.style.height = percent + "%";
    amountText.textContent = "$" + amount.toLocaleString();
  }

  input.addEventListener("input", () => {
    update(input.value);
  });
</script>

</body>
</html>
