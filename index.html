<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SVS Fundraising Thermometer</title>
<style>
  :root {
    --svs-purple: #4A306D;
    --svs-peach: #F2D0C9;
    --svs-dark: #331f4d;
  }

  body {
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center; /* Keeps everything centered vertically */
    align-items: center;    /* Keeps everything centered horizontally */
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #ffffff;
    color: #111;
  }

  /* LOGO */
  .header {
    margin-bottom: 20px;
  }
  .logo {
    max-width: 250px;
    height: auto;
  }

  /* MAIN THERMOMETER AREA */
  .container {
    display: flex;
    align-items: center;
    gap: 60px;
    margin-bottom: 30px;
  }

  /* SCALE */
  .scale {
    height: 400px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    font-size: 14px;
    font-weight: bold;
    color: var(--svs-purple);
    opacity: 0.8;
  }

  /* THERMOMETER TUBE */
  .thermometer {
    position: relative;
    width: 80px;
    height: 400px;
    background: #f0f0f0;
    border: 2px solid #ddd;
    border-radius: 40px;
    overflow: hidden;
    box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
  }

  .fill {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 0%;
    background: linear-gradient(to top, var(--svs-purple), var(--svs-peach));
    transition: height 0.6s ease-out;
  }

  /* INFO */
  .info {
    text-align: left;
  }
  .title { font-size: 24px; color: #666; margin: 0; }
  .amount { font-size: 50px; font-weight: 800; color: var(--svs-purple); margin: 5px 0; }
  .goal { font-size: 28px; font-weight: 700; color: #999; }

  /* CONTROLS AT BOTTOM */
  .controls {
    text-align: center;
    background: #f9f9f9;
    padding: 20px;
    border-radius: 15px;
    border: 1px solid #eee;
  }

  .button-group {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
  }

  button {
    padding: 10px 15px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    border: none;
    border-radius: 6px;
    background: var(--svs-purple);
    color: white;
    transition: opacity 0.2s;
  }

  button:hover { opacity: 0.9; }
  button:active { transform: scale(0.98); }

  .undo-btn {
    background: #ba3d3d;
    font-size: 12px;
    margin-top: 10px;
  }

  input {
    padding: 9px;
    font-size: 16px;
    border: 1px solid #ccc;
    border-radius: 6px;
    width: 100px;
    text-align: center;
  }
</style>
</head>
<body>

  <div class="header">
    <img src="Main SVS Logo.jpg" alt="SVS Logo" class="logo">
  </div>

  <div class="container">
    <div class="scale">
      <div>$85,000</div>
      <div>$63,750</div>
      <div>$42,500</div>
      <div>$21,250</div>
      <div>$0</div>
    </div>

    <div class="thermometer">
      <div class="fill" id="fill"></div>
    </div>

    <div class="info">
      <p class="title">Progress</p>
      <div class="amount" id="amountText">$0</div>
      <div class="goal">Goal: $85,000</div>
    </div>
  </div>

  <div class="controls">
    <div class="button-group">
      <button onclick="add(10)">+$10</button>
      <button onclick="add(100)">+$100</button>
      <button onclick="add(1000)">+$1,000</button>
    </div>
    
    <div>
      <input type="number" id="customInput" placeholder="Other">
      <button onclick="addCustom()">Add</button>
    </div>

    <button class="undo-btn" onclick="undo()">Undo Last</button>
  </div>

  <script>
    const goal = 85000;
    let current = 0;
    let history = [];

    const fill = document.getElementById('fill');
    const text = document.getElementById('amountText');
    const custom = document.getElementById('customInput');

    function update() {
      const percent = Math.min((current / goal) * 100, 100);
      fill.style.height = percent + '%';
      text.textContent = '$' + current.toLocaleString();
    }

    function add(amt) {
      history.push(current); // Save current for undo
      current += amt;
      update();
    }

    function addCustom() {
      const val = parseInt(custom.value);
      if(val > 0) {
        add(val);
        custom.value = '';
      }
    }

    function undo() {
      if(history.length > 0) {
        current = history.pop();
        update();
      }
    }
  </script>
