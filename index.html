<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fundraising Thermometer</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #0f172a;
    font-family: Arial, sans-serif;
    color: white;
  }

  .container {
    display: flex;
    align-items: center;
    gap: 80px;
  }

  /* LEFT LABELS (MARKINGS) */
  .scale {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    height: 80vh;
    font-size: 14px;
    opacity: 0.9;
  }

  .scale div {
    position: relative;
  }

  .scale div::after {
    content: "";
    position: absolute;
    left: 60px;
    top: 50%;
    width: 15px;
    height: 2px;
    background: white;
    opacity: 0.5;
  }

  /* THERMOMETER */
  .thermometer {
    position: relative;
    width: 120px;
    height: 80vh;
    background: rgba(255, 255, 255, 0.08);
    border-radius: 60px;
    border: 2px solid rgba(255,255,255,0.3);
    overflow: hidden;
    backdrop-filter: blur(6px);
  }

  .fill {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 30%;
    background: linear-gradient(to top, #ff3b3b, #ffb347);
    transition: height 0.6s ease;
  }

  .bulb {
    position: absolute;
    bottom: -70px;
    left: 50%;
    transform: translateX(-50%);
    width: 160px;
    height: 160px;
    background: #ff3b3b;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.3);
  }

  /* CENTER LABEL */
  .info {
    text-align: left;
  }

  .title {
    font-size: 32px;
    font-weight: bold;
    margin-bottom: 10px;
  }

  .amount {
    font-size: 28px;
    margin-bottom: 10px;
  }

  .goal {
    font-size: 18px;
    opacity: 0.8;
  }

</style>
</head>

<body>

<div class="container">

  <!-- SCALE -->
  <div class="scale">
    <div>$85,000</div>
    <div>$75,000</div>
    <div>$65,000</div>
    <div>$55,000</div>
    <div>$45,000</div>
    <div>$35,000</div>
    <div>$25,000</div>
    <div>$15,000</div>
    <div>$5,000</div>
    <div>$0</div>
  </div>

  <!-- THERMOMETER -->
  <div class="thermometer">
    <div class="fill" id="fill"></div>
    <div class="bulb"></div>
  </div>

  <!-- INFO -->
  <div class="info">
    <div class="title">Fundraising Goal</div>
    <div class="amount" id="amount">$25,500</div>
    <div class="goal">Goal: $85,000</div>
  </div>

</div>

<script>
  const goal = 85000;

  let currentAmount = 25500; // change this anytime

  const fill = document.getElementById("fill");
  const amountText = document.getElementById("amount");

  function updateThermometer(amount) {
    const percent = (amount / goal) * 100;
    fill.style.height = percent + "%";
    amountText.textContent = "$" + amount.toLocaleString();
  }

  updateThermometer(currentAmount);

  // Example live update (you can delete this later)
  // setInterval(() => {
  //   currentAmount += 500;
  //   updateThermometer(currentAmount);
  // }, 3000);

</script>

</body>
</html>
