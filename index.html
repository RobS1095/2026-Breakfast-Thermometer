<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Thermometer</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #ffffff;
    font-family: Arial, sans-serif;
    color: #111;
  }

  /* INPUT */
  .controls {
    position: absolute;
    top: 20px;
    text-align: center;
  }

  input {
    padding: 10px;
    font-size: 18px;
    border-radius: 8px;
    border: 1px solid #ccc;
    width: 220px;
  }

  button {
    padding: 10px 15px;
    font-size: 16px;
    margin-left: 10px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    background: #111;
    color: white;
  }

  .container {
    display: flex;
    align-items: center;
    gap: 80px;
  }

  /* SCALE */
  .scale {
    height: 80vh;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    font-size: 14px;
    opacity: 0.6;
  }

  /* THERMOMETER BODY */
  .thermometer {
    position: relative;
    width: 120px;
    height: 80vh;
    background: #f3f3f3;
    border-radius: 60px;
    border: 2px solid #ddd;
    overflow: hidden;
  }

  .fill {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 0%;
    background: linear-gradient(to top, #ff3b3b, #ffb347);
    transition: height 0.6s ease;
  }

  /* CLEAN BOTTOM FIX (NO HALF-CIRCLE GLOW) */
  .thermometer::after {
    content: "";
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 30px;
    background: #f3f3f3;
    z-index: 2;
  }

  /* BULB (now aligned cleanly, no overlap glitch) */
  .bulb {
    position: absolute;
    bottom: -70px;
    left: 50%;
    transform: translateX(-50%);
    width: 150px;
    height: 150px;
    background: #ff3b3b;
    border-radius: 50%;
    border: 2px solid #ddd;
    z-index: 1;
  }

  /* SMALL 5% WIDTH MARKERS */
  .tick {
    position: absolute;
    left: 0;
    width: 5%;
    height: 1px;
    background: rgba(0,0,0,0.12);
  }

  .tick-label {
    position: absolute;
    left: 10%;
    font-size: 11px;
    opacity: 0.3;
    transform: translateY(-50%);
  }

  /* INFO */
  .info {
    text-align: left;
  }

  .title {
    font-size: 34px;
    font-weight: 700;
    margin-bottom: 10px;
  }

  .amount {
    font-size: 30px;
    margin-bottom: 10px;
  }

  .goal {
    font-size: 26px;
    font-weight: 700;
    margin-top: 10px;
  }

</style>
</head>

<body>

<!-- INPUT -->
<div class="controls">
  <input id="input" type="number" placeholder="Enter amount ($)">
  <button onclick="updateFromInput()">Update</button>
</div>

<div class="container">

  <!-- SCALE -->
  <div class="scale">
    <div>$85,000</div>
    <div>$63,750</div>
    <div>$42,500</div>
    <div>$21,250</div>
    <div>$0</div>
  </div>

  <!-- THERMOMETER -->
  <div class="thermometer">

    <!-- subtle 25/50/75 markers (5% width) -->
    <div class="tick" style="bottom:25%"></div>
    <div class="tick-label" style="bottom:25%">25%</div>

    <div class="tick" style="bottom:50%"></div>
    <div class="tick-label" style="bottom:50%">50%</div>

    <div class="tick" style="bottom:75%"></div>
    <div class="tick-label" style="bottom:75%">75%</div>

    <div class="fill" id="fill"></div>
    <div class="bulb"></div>
  </div>

  <!-- INFO -->
  <div class="info">
    <div class="title">Fundraising Progress</div>
    <div class="amount" id="amount">$0</div>
    <div class="goal">Goal: $85,000</div>
  </div>

</div>

<script>
  const goal = 85000;

  const fill = document.getElementById("fill");
  const amountText = document.getElementById("amount");
  const input = document.getElementById("input");

  function updateThermometer(amount) {
    const percent = (amount / goal) * 100;
    fill.style.height = percent + "%";
    amountText.textContent = "$" + Number(amount).toLocaleString();
  }

  function updateFromInput() {
    const value = Number(input.value);
    if (!isNaN(value)) updateThermometer(value);
  }

  input.addEventListener("keypress", (e) => {
    if (e.key === "Enter") updateFromInput();
  });

</script>

</body>
</html>
