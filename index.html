<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fundraising Thermometer</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #ffffff;
    font-family: Arial, sans-serif;
    color: #111;
  }

  .controls {
    position: absolute;
    top: 20px;
    display: flex;
    gap: 20px;
  }

  input {
    padding: 10px;
    font-size: 16px;
    border-radius: 8px;
    border: 1px solid #ccc;
    width: 200px;
  }

  .container {
    display: flex;
    align-items: center;
    gap: 80px;
  }

  /* SCALE */
  .scale {
    height: 80vh;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    font-size: 14px;
    opacity: 0.6;
  }

  /* THERMOMETER */
  .thermometer {
    position: relative;
    width: 120px;
    height: 80vh;
    background: #f3f3f3;
    border-radius: 60px;
    border: 2px solid #ddd;
    overflow: hidden;
  }

  .fill {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 0%;
    background: linear-gradient(to top, #ff3b3b, #ffb347);
    transition: height 0.4s ease;
    border-radius: 60px 60px 0 0;
  }

  /* REMOVE BULB COMPLETELY (fixes red bottom issue) */
  .bulb {
    display: none;
  }

  /* MARKERS (subtle) */
  .tick {
    position: absolute;
    left: 0;
    width: 5%;
    height: 1px;
    background: rgba(0,0,0,0.12);
  }

  .tick-label {
    position: absolute;
    left: 10%;
    font-size: 11px;
    opacity: 0.3;
    transform: translateY(-50%);
  }

  /* INFO */
  .info {
    text-align: left;
  }

  .title {
    font-size: 34px;
    font-weight: 700;
    margin-bottom: 10px;
  }

  .amount {
    font-size: 32px;
    margin-bottom: 10px;
  }

  .goal {
    font-size: 36px;   /* 🔥 BIGGER GOAL */
    font-weight: 800;
    margin-top: 10px;
  }

</style>
</head>

<body>

<!-- INPUT (live typing) -->
<div class="controls">
  <input id="amountInput" type="number" placeholder="Current amount ($)">
</div>

<div class="container">

  <!-- SCALE -->
  <div class="scale">
    <div>$85,000</div>
    <div>$63,750</div>
    <div>$42,500</div>
    <div>$21,250</div>
    <div>$0</div>
  </div>

  <!-- THERMOMETER -->
  <div class="thermometer">

    <div class="tick" style="bottom:25%"></div>
    <div class="tick-label" style="bottom:25%">25%</div>

    <div class="tick" style="bottom:50%"></div>
    <div class="tick-label" style="bottom:50%">50%</div>

    <div class="tick" style="bottom:75%"></div>
    <div class="tick-label" style="bottom:75%">75%</div>

    <div class="fill" id="fill"></div>

  </div>

  <!-- INFO -->
  <div class="info">
    <div class="title">Fundraising Progress</div>
    <div class="amount" id="amount">$0</div>
    <div class="goal">Goal: $85,000</div>
  </div>

</div>

<script>
  const goal = 85000;

  const fill = document.getElementById("fill");
  const amountText = document.getElementById("amount");
  const input = document.getElementById("amountInput");

  function update(amount) {
    const percent = (amount / goal) * 100;
    fill.style.height = percent + "%";
    amountText.textContent = "$" + Number(amount || 0).toLocaleString();
  }

  // LIVE typing (no button needed)
  input.addEventListener("input", () => {
    update(Number(input.value));
  });

</script>

</body>
</html>
